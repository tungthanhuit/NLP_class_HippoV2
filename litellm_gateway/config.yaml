# LiteLLM Proxy configuration
# - Routes BOTH chat-completions and embeddings to the same upstream OpenAI-compatible API base.
# - Exposes friendly local model names (model_name) that you can use from clients.
#
# Upstream
#   BASE_URL: https://mkp-api.fptcloud.com
# Auth
#   Set FPT_API_KEY via your shell or a .env file loaded by start_gateway.sh

model_list:
  # LLM gemini-3.1-flash-lite-preview
  - model_name: gemini-3.1-flash-lite-preview
    litellm_params:
      model: openai/gemini-3.1-flash-lite-preview
      api_base: https://llm.wokushop.com/v1
      api_key: os.environ/WOKU_API_KEY

  # LLM gemini-2.5-flash-lite
  - model_name: gemini-2.5-flash-lite
    litellm_params:
      model: openai/gemini-2.5-flash-lite
      api_base: https://llm.wokushop.com/v1
      api_key: os.environ/WOKU_API_KEY

  # LLM gpt-4o-mini
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-oss-20b
      api_base: https://mkp-api.fptcloud.com
      api_key: os.environ/FPT_API_KEY

  # Embeddings
  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/multilingual-e5-large
      api_base: https://mkp-api.fptcloud.com
      api_key: os.environ/FPT_API_KEY

  # Embeddings (alias matching upstream name)
  - model_name: multilingual-e5-large
    litellm_params:
      model: openai/multilingual-e5-large
      api_base: https://mkp-api.fptcloud.com
      api_key: os.environ/FPT_API_KEY

# Optional: if you want to require an auth key for local clients, uncomment this.
# general_settings:
#   master_key: os.environ/LITELLM_MASTER_KEY